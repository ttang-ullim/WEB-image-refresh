services:
  - type: web
    name: lumex-image-refresh
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 300
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: LUMEX_OWNER_TOKEN
        generateValue: true
      - key: CONTACT_EMAIL
        value: rumex.soft@gmail.com

  - type: static
    name: rumex-image-refresh-site
    staticPublishPath: site
    pullRequestPreviewsEnabled: false
